<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG KIỂM ĐỊNH BẢO MẬT | MM88 GLOBAL</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --gold: #ffcc00;
            --dark-bg: #000000;
        }

        * { box-sizing: border-box; user-select: none; }
        
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--dark-bg); 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
        }

        #matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.12;
            z-index: 1;
            pointer-events: none;
        }

        .main-frame { 
            width: 95%; 
            max-width: 450px; 
            background: rgba(5, 5, 5, 0.98); 
            border: 2px solid var(--neon-green); 
            padding: 30px 20px; 
            border-radius: 8px; 
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2); 
            position: relative; 
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        
        .header { text-align: center; border-bottom: 1px solid #222; margin-bottom: 25px; padding-bottom: 15px; }
        .header h1 { font-size: 22px; margin: 0; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; font-weight: 900; }
        .header p { font-size: 11px; color: #666; margin-top: 8px; font-weight: bold; }

        .input-group { display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; text-align: center; }
        
        input { 
            background: #000 !important; 
            border: 1px solid #333; 
            padding: 16px; 
            color: var(--neon-green) !important; 
            outline: none; 
            border-radius: 4px; 
            font-size: 18px; 
            width: 100%;
            text-align: center;
            font-weight: bold;
        }
        
        button { 
            background: var(--gold); 
            color: #000; 
            border: none; 
            padding: 18px; 
            font-weight: 900; 
            cursor: pointer; 
            border-radius: 4px; 
            text-transform: uppercase; 
            font-size: 18px; 
            margin-top: 10px;
        }

        /* Scanning UI */
        #scan-area { display: none; margin-top: 20px; }
        .radar {
            width: 60px; height: 60px;
            border: 3px solid var(--neon-green);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .progress-bar { background: #111; height: 6px; width: 100%; margin: 15px 0; border-radius: 3px; overflow: hidden; }
        #fill { background: var(--neon-green); height: 100%; width: 0%; box-shadow: 0 0 10px var(--neon-green); }

        #logs { 
            background: #050505; 
            height: 90px; 
            padding: 10px; 
            font-size: 10px; 
            color: #444; 
            overflow: hidden; 
            border: 1px solid #111;
            line-height: 1.6;
        }

        #result { display: none; margin-top: 20px; padding: 25px; border: 2px solid; text-align: center; border-radius: 6px; }
        .safe { border-color: var(--neon-green); color: var(--neon-green); background: rgba(0, 255, 65, 0.05); }
        .danger { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255, 49, 49, 0.05); }

        .btn-retry {
            background: transparent;
            border: 1px solid #333;
            color: #555;
            margin-top: 20px;
            width: 100%;
            font-size: 12px;
            padding: 10px;
        }

        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
    </style>
</head>

<canvas id="matrix-bg"></canvas>

<div class="main-frame" id="box">
    <div class="header">
        <h1>SECURE CHECKER</h1>
        <p>HỆ THỐNG ĐỐI SOÁT DỮ LIỆU THỰC</p>
    </div>

    <div id="input-ui" class="input-group">
        <label>NHẬP ACCOUNT ID CẦN QUÉT:</label>
        <input type="text" id="username" placeholder="Nhập ID..." autocomplete="off" spellcheck="false">
        <button onclick="runScan()">BẮT ĐẦU KIỂM TRA</button>
    </div>

    <div id="scan-area">
        <div class="radar"></div>
        <div style="display:flex; justify-content: space-between; font-size: 11px; color: var(--gold); margin-bottom: 5px;">
            <span>Đang truy xuất Node...</span>
            <span id="perc">0%</span>
        </div>
        <div class="progress-bar"><div id="fill"></div></div>
        <div id="logs"></div>
    </div>
