<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG QUÉT BẢO MẬT | MM88 GLOBAL</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --gold: #ffcc00;
            --dark-bg: #050505;
        }
        body { font-family: 'Courier New', Courier, monospace; background: var(--dark-bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .main-frame { width: 95%; max-width: 480px; background: #111; border: 2px solid #333; padding: 25px; border-radius: 5px; box-shadow: 0 0 30px rgba(0,0,0,0.9); position: relative; }
        .header { text-align: center; border-bottom: 1px solid #333; margin-bottom: 20px; padding-bottom: 10px; }
        .header h1 { font-size: 18px; margin: 0; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .header p { font-size: 10px; color: #666; margin: 5px 0; }

        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .input-item { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; color: var(--gold); text-transform: uppercase; margin-left: 2px; font-weight: bold; }
        input { background: #000; border: 1px solid #444; padding: 12px; color: var(--neon-green); font-weight: bold; outline: none; border-radius: 3px; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 5px rgba(255, 204, 0, 0.3); }
        
        button { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: 900; cursor: pointer; border-radius: 3px; transition: 0.2s; text-transform: uppercase; margin-top: 5px; font-size: 14px; }
        button:hover { background: #fff; transform: scale(1.02); }

        #console-output { background: #000; height: 140px; border: 1px solid #222; padding: 10px; font-size: 11px; color: #888; overflow-y: hidden; margin-top: 15px; line-height: 1.4; border-radius: 3px; }
        
        #result-display { display: none; padding: 15px; border: 2px solid; text-align: center; border-radius: 4px; margin-top: 15px; }
        .safe-result { border-color: var(--neon-green); background: rgba(0, 255, 65, 0.05); }
        .danger-result { border-color: var(--neon-red); background: rgba(255, 49, 49, 0.05); }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }
        .shake-effect { animation: shake 0.5s; animation-iteration-count: 2; }
        .scan-line { height: 2px; background: var(--neon-green); width: 100%; position: absolute; top: 0; left: 0; opacity: 0; transition: 0.1s; box-shadow: 0 0 10px var(--neon-green); z-index: 10; }
    </style>
</head>
<body>

<div class="main-frame" id="scanner-box">
    <div class="scan-line" id="laser"></div>
    <div class="header">
        <h1>HỆ THỐNG QUÉT BẢO MẬT</h1>
        <p>SECURE VERIFICATION SYSTEM • VERSION 5.0.5</p>
    </div>

    <div class="input-group">
        <div class="input-item">
            <label>Trang web:</label>
            <input type="text" id="domain" placeholder="Ví dụ: mm88c.com, mm88q.com...">
        </div>
        <div class="input-item">
            <label>Tên người dùng (Username):</label>
            <input type="text" id="username" placeholder="Nhập tên nhân vật cần kiểm tra...">
        </div>
        <button onclick="executeScan()">KÍCH HOẠT QUÉT HỆ THỐNG</button>
    </div>

    <div id="console-output">> Đang chờ nhập dữ liệu để phân tích...</div>
    <div id="result-display"></div>
</div>

<script>
    const steps = [
        "Đang xác thực địa chỉ IP server...",
        "Truy quét Scripts ẩn trên trang web...",
        "Phân tích lịch sử dữ liệu Username...",
        "Kiểm tra thuật toán điều hướng (RNG)...",
        "Dò tìm mã độc can thiệp kết quả...",
        "Xác minh chứng chỉ bảo mật quốc tế...",
        "Đối soát MD5 Database gốc...",
        "Kết thúc phiên quét bảo mật..."
    ];

    function executeScan() {
        const domain = document.getElementById('domain').value.trim().toLowerCase();
        const user = document.getElementById('username').value.trim();
        
        if(!domain || !user) return alert("Vui lòng nhập đầy đủ Trang web và Username!");

        const consoleOut = document.getElementById('console-output');
        const laser = document.getElementById('laser');
        const box = document.getElementById('scanner-box');
        const result = document.getElementById('result-display');
        
        consoleOut.innerHTML = "> Đang kết nối mục tiêu: " + domain;
        result.style.display = 'none';
        box.classList.remove('shake-effect');
        laser.style.opacity = '1';

        let i = 0;
        const interval = setInterval(() => {
            if(i < steps.length) {
                const p = document.createElement('div');
                p.innerText = "> " + steps[i];
                consoleOut.appendChild(p);
                consoleOut.scrollTop = consoleOut.scrollHeight;
                laser.style.top = (i * 12) + "%";
                i++;
            } else {
                clearInterval(interval);
                laser.style.opacity = '0';
                renderResult(domain, user);
            }
        }, 400);
    }

    function renderResult(domain, user) {
        const result = document.getElementById('result-display');
        const box = document.getElementById('scanner-box');
        result.style.display = 'block';

        // LOGIC TÊN MIỀN HỆ THỐNG (Chỉ cần chứa chữ 'mm88' là báo sạch)
        if(domain.includes("mm88")) {
            result.className = "safe-result";
            result.innerHTML = `
                <h2 style="color:var(--neon-green); margin:0; font-size: 18px;">XÁC MINH: AN TOÀN</h2>
                <p style="font-size:12px; color:#ccc; line-height: 1.5; margin-top: 10px;">
                    Hệ thống xác nhận trang web <b>${domain}</b> đạt chuẩn bảo mật.<br>
                    Tài khoản <b>${user}</b> hoạt động trên mã nguồn gốc.<br>
                    <b>KHÔNG PHÁT HIỆN MÃ ẨN CAN THIỆP.</b>
                </p>
                <div style="font-size:10px; color:var(--neon-green); margin-top: 5px;">MD5 HASH: MATCHED ✅</div>
            `;
        } 
        // ĐỐI THỦ (Tỷ lệ 80% báo nguy hiểm)
        else {
            const isDanger = Math.random() < 0.8;
            if(isDanger) {
                box.classList.add('shake-effect');
                result.className = "danger-result";
                result.innerHTML = `
                    <h2 style="color:var(--neon-red); margin:0; font-size: 18px;">CẢNH BÁO RỦI RO</h2>
                    <p style="font-size:12px; color:#ccc; line-height: 1.5; margin-top: 10px;">
                        Phát hiện <b>Mã Ẩn (Script Obfuscation)</b> trên trang web.<br>
                        Tài khoản <b>${user}</b> có dấu hiệu bị điều hướng kết quả.<br>
                        <b>KHÔNG NÊN TIẾP TỤC GIAO DỊCH.</b>
                    </p>
                    <div style="font-size:10px; color:var(--neon-red); margin-top: 5px;">STATUS: INSECURE ❌</div>
                `;
            } else {
                result.className = "safe-result";
                result.innerHTML = `
                    <h2 style="color:var(--neon-green); margin:0; font-size: 18px;">KẾT QUẢ: TẠM ỔN</h2>
                    <p style="font-size:12px; color:#ccc; margin-top: 10px;">Chưa phát hiện mã ẩn can thiệp trực tiếp tại thời điểm quét.</p>
                `;
            }
        }
    }
</script>
</body>
</html>
