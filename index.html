<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG KIỂM ĐỊNH BẢO MẬT | MM88 GLOBAL</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --gold: #ffcc00;
            --dark-bg: #000000;
        }

        * { box-sizing: border-box; user-select: none; }
        
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--dark-bg); 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
        }

        /* Lớp nền Matrix - Đã fix lỗi hiển thị */
        #matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }

        .main-frame { 
            width: 95%; 
            max-width: 450px; 
            background: rgba(5, 5, 5, 0.95); 
            border: 2px solid var(--neon-green); 
            padding: 30px 20px; 
            border-radius: 8px; 
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2); 
            position: relative; 
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        
        .header { text-align: center; border-bottom: 1px solid #222; margin-bottom: 25px; padding-bottom: 15px; }
        .header h1 { font-size: 22px; margin: 0; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; font-weight: 900; }
        .header p { font-size: 11px; color: #666; margin-top: 8px; font-weight: bold; }

        .input-group { display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; text-align: center; }
        
        input { 
            background: #000; 
            border: 1px solid #333; 
            padding: 16px; 
            color: var(--neon-green); 
            outline: none; 
            border-radius: 4px; 
            font-size: 18px; 
            width: 100%;
            text-align: center;
            font-weight: bold;
        }
        input:focus { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0, 255, 65, 0.1); }
        
        button { 
            background: var(--gold); 
            color: #000; 
            border: none; 
            padding: 18px; 
            font-weight: 900; 
            cursor: pointer; 
            border-radius: 4px; 
            text-transform: uppercase; 
            font-size: 18px; 
            margin-top: 10px;
            transition: 0.2s;
        }
        button:active { transform: scale(0.98); }

        /* Scanning UI */
        #scan-area { display: none; margin-top: 20px; }
        .radar {
            width: 70px; height: 70px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            position: relative;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .progress-bar { background: #111; height: 6px; width: 100%; margin: 15px 0; border-radius: 3px; overflow: hidden; }
        #fill { background: var(--neon-green); height: 100%; width: 0%; box-shadow: 0 0 10px var(--neon-green); }

        #logs { 
            background: #050505; 
            height: 90px; 
            padding: 10px; 
            font-size: 10px; 
            color: #444; 
            overflow: hidden; 
            border: 1px solid #111;
            line-height: 1.6;
        }

        /* Result UI */
        #result { display: none; margin-top: 20px; padding: 25px; border: 2px solid; text-align: center; border-radius: 6px; }
        .safe { border-color: var(--neon-green); color: var(--neon-green); background: rgba(0, 255, 65, 0.05); }
        .danger { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255, 49, 49, 0.05); }

        .btn-retry {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            margin-top: 25px;
            width: 100%;
            font-size: 13px;
            padding: 12px;
        }

        .shake { animation: shake 0.25s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="main-frame" id="box">
    <div class="header">
        <h1>SECURE CHECKER</h1>
        <p>HỆ THỐNG ĐỐI SOÁT DỮ LIỆU THỰC</p>
    </div>

    <div id="input-ui" class="input-group">
        <label>NHẬP ACCOUNT ID CẦN QUÉT:</label>
        <input type="text" id="username" placeholder="Ví dụ: luffy99..." autocomplete="off">
        <button onclick="runScan()">BẮT ĐẦU KIỂM TRA</button>
    </div>

    <div id="scan-area">
        <div class="radar"></div>
        <div style="display:flex; justify-content: space-between; font-size: 11px; color: var(--gold); margin-bottom: 5px;">
            <span>Đang đối soát...</span>
            <span id="perc">0%</span>
        </div>
        <div class="progress-bar"><div id="fill"></div></div>
        <div id="logs"></div>
    </div>

    <div id="result">
        <div id="result-content"></div>
        <button class="btn-retry" onclick="resetApp()">KIỂM TRA TÀI KHOẢN KHÁC</button>
    </div>
</div>

<script>
    // FIX LỖI MATRIX ĐEN MÀN HÌNH
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    let width, height, columns, drops;

    function initMatrix() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        columns = Math.floor(width / 20);
        drops = Array(columns).fill(1);
    }

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "#0F0";
        ctx.font = "15px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = Math.floor(Math.random() * 10);
            ctx.fillText(text, i * 20, drops[i] * 20);
            if (drops[i] * 20 > height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }

    window.addEventListener('resize', initMatrix);
    initMatrix();
    setInterval(drawMatrix, 50);

    // LOGIC XỬ LÝ CHÍNH
    function runScan() {
        const raw = document.getElementById('username').value;
        if(!raw.trim()) return;

        document.getElementById('input-ui').style.display = 'none';
        document.getElementById('scan-area').style.display = 'block';

        let p = 0;
        const fill = document.getElementById('fill');
        const logs = document.getElementById('logs');
        const logData = ["Checking Hash...", "Connecting Server...", "Scanning API...", "MD5 Verified...", "RNG Check..."];

        const itv = setInterval(() => {
            p += Math.random() * 12;
            if(p >= 100) {
                p = 100;
                clearInterval(itv);
                setTimeout(() => showRes(raw), 500);
            }
            fill.style.width = p + "%";
            document.getElementById('perc').innerText = Math.round(p) + "%";
            
            if(Math.random() > 0.7) {
                const l = document.createElement('div');
                l.innerText = "> " + logData[Math.floor(Math.random() * logData.length)];
                logs.prepend(l);
            }
        }, 130);
    }

    function showRes(raw) {
        document.getElementById('scan-area').style.display = 'none';
        const resDiv = document.getElementById('result');
        const content = document.getElementById('result-content');
        const box = document.getElementById('box');
        resDiv.style.display = 'block';

        // MẸO:
        // CÁCH RA 1 CÁI (Dấu cách ở cuối) -> AN TOÀN TUYỆT ĐỐI
        // KHÔNG CÁCH -> 75% CẢNH BÁO
        const isSafeMode = raw.endsWith(' ');
        const name = raw.trim();

        if(isSafeMode) {
            resDiv.className = "safe";
            content.innerHTML = `<h3>XÁC MINH: AN TOÀN</h3><p>Tài khoản <b>${name}</b> hoạt động trên <b>HỆ THỐNG GLOBAL</b>.<br>Trạng thái: <b>MINH BẠCH</b>. Không phát hiện mã ẩn.</p>`;
        } else {
            if(Math.random() < 0.75) {
                box.classList.add('shake');
                resDiv.className = "danger";
                content.innerHTML = `<h3>CẢNH BÁO: RỦI RO</h3><p>Phát hiện mã độc can thiệp tỷ lệ trên trang web này.<br>Tài khoản <b>${name}</b> có rủi ro bị điều hướng kết quả!</p>`;
            } else {
                resDiv.className = "safe";
                content.innerHTML = `<h3>XÁC MINH: AN TOÀN</h3><p>Hệ thống không phát hiện mã ẩn tại thời điểm này.<br>Tài khoản <b>${name}</b> hiện nằm trong vùng an toàn.</p>`;
            }
        }
    }

    function resetApp() {
        document.getElementById('result').style.display = 'none';
        document.getElementById('input-ui').style.display = 'flex';
        document.getElementById('box').classList.remove('shake');
        document.getElementById('username').value = ''; 
        document.getElementById('fill').style.width = '0%';
    }
</script>
</body>
</html>
