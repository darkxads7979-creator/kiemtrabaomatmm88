        :root {
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --gold: #ffcc00;
            --dark-bg: #000000;
        }

        * { box-sizing: border-box; user-select: none; }
        
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--dark-bg); 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
        }

        #matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.15;
            z-index: 1;
        }

        .main-frame { 
            width: 95%; 
            max-width: 480px; 
            background: rgba(10, 10, 10, 0.95); 
            border: 2px solid var(--neon-green); 
            padding: 25px; 
            border-radius: 5px; 
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3); 
            position: relative; 
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .header h1 { font-size: 20px; margin: 0; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .header p { font-size: 10px; color: #888; margin-top: 5px; }

        .input-group { display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

            background: #000; 
            border: 1px solid #444; 
            padding: 15px;

            outline: none; 
            border-radius: 3px; 
            font-size: 16px; 
            width: 100%;
            text-align: center;
        }
        input:focus { border-color: var(--gold); }
