<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURITY SYSTEM v5.2.2</title>
    <style>
        :root { --green: #00ff41; --red: #ff3131; --gold: #ffcc00; --bg: #000; }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.1; z-index: 1; pointer-events: none; }
        .frame { width: 92%; max-width: 420px; background: rgba(10, 10, 10, 0.98); border: 1px solid var(--green); padding: 25px; border-radius: 4px; position: relative; z-index: 10; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        h1 { font-size: 18px; color: var(--gold); margin: 0; letter-spacing: 2px; }
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        input { background: #000; border: 1px solid #333; padding: 15px; color: var(--green); font-size: 18px; text-align: center; outline: none; border-radius: 4px; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; border-radius: 4px; }
        #scan, #result { display: none; margin-top: 15px; text-align: center; }
        .radar { width: 50px; height: 50px; border: 3px solid var(--green); border-radius: 50%; border-top-color: transparent; margin: 0 auto 15px; animation: s 0.7s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
        .bar { background: #111; height: 4px; width: 100%; margin: 10px 0; border-radius: 2px; overflow: hidden; }
        #fill { background: var(--green); height: 100%; width: 0%; box-shadow: 0 0 10px var(--green); }
        #res-box { padding: 20px; border: 2px solid; border-radius: 4px; }
        .safe { border-color: var(--green); color: var(--green); }
        .danger { border-color: var(--red); color: var(--red); }
        .retry { margin-top: 15px; background: none; border: 1px solid #444; color: #666; width: 100%; padding: 10px; cursor: pointer; font-size: 12px; }
        .shake { animation: sk 0.2s infinite; }
        @keyframes sk { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-2px)} 75%{transform:translateX(2px)} }
    </style>
</head>
<body>
<canvas id="matrix"></canvas>
<div class="frame" id="box">
    <div class="header"><h1>SECURITY CHECKER</h1></div>
    <div id="ui" class="input-group">
        <input type="text" id="user" placeholder="Nhập ACCOUNT ID..." autocomplete="off">
        <button onclick="start()">KIỂM TRA NGAY</button>
    </div>
    <div id="scan">
        <div class="radar"></div>
        <div id="fill-text" style="font-size:12px;color:var(--gold)">0%</div>
        <div class="bar"><div id="fill"></div></div>
    </div>
    <div id="result">
        <div id="res-box"></div>
        <button class="retry" onclick="location.reload()">KIỂM TRA TÀI KHOẢN KHÁC</button>
    </div>
</div>
<script>
    const c = document.getElementById('matrix'), x = c.getContext('2d');
    let w = c.width = window.innerWidth, h = c.height = window.innerHeight, cols = Math.floor(w/20), d = Array(cols).fill(1);
    function draw() { x.fillStyle="rgba(0,0,0,0.05)"; x.fillRect(0,0,w,h); x.fillStyle="#0F0"; d.forEach((y,i)=>{ x.fillText(Math.floor(Math.random()*10),i*20,y*20); if(y*20>h&&Math.random()>0.975)d[i]=0; d[i]++; }); }
    setInterval(draw, 50);

    function start() {
        const val = document.getElementById('user').value;
        if(!val.trim()) return;
        document.getElementById('ui').style.display = 'none';
        document.getElementById('scan').style.display = 'block';
        let p = 0;
        const itv = setInterval(() => {
            p += Math.random()*15;
            if(p >= 100) { p=100; clearInterval(itv); setTimeout(()=>done(val), 400); }
            document.getElementById('fill').style.width = p+'%';
            document.getElementById('fill-text').innerText = Math.round(p)+'%';
        }, 100);
    }

    function done(val) {
        document.getElementById('scan').style.display = 'none';
        const res = document.getElementById('result'), box = document.getElementById('res-box'), main = document.getElementById('box');
        res.style.display = 'block';
        
        // MẸO: Nhấn phím cách 2 lần ở cuối để ra AN TOÀN
        const isSafe = val.endsWith('  '); 
        const name = val.trim();

        if(isSafe) {
            box.className = "safe";
            box.innerHTML = `<h3>AN TOÀN</h3><p>ID: ${name}<br>Hệ thống: MM88 GLOBAL<br>Trạng thái: MINH BẠCH</p>`;
        } else {
            if(Math.random() < 0.75) {
                main.classList.add('shake');
                box.className = "danger";
                box.innerHTML = `<h3>RỦI RO CAO</h3><p>ID: ${name}<br>Trang web lạ có dấu hiệu can thiệp mã độc thắng thua!</p>`;
            } else {
                box.className = "safe";
                box.innerHTML = `<h3>AN TOÀN</h3><p>ID: ${name}<br>Hiện chưa phát hiện mã ẩn can thiệp.</p>`;
            }
        }
    }
</script>
</body>
</html>
