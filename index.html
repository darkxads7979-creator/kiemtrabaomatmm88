<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG KIỂM ĐỊNH BẢO MẬT | MM88 GLOBAL</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --gold: #ffcc00;
            --dark-bg: #000000;
        }

        * { box-sizing: border-box; user-select: none; }
        
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--dark-bg); 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
        }

        #matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.15;
            z-index: 1;
        }

        .main-frame { 
            width: 95%; 
            max-width: 480px; 
            background: rgba(10, 10, 10, 0.95); 
            border: 2px solid var(--neon-green); 
            padding: 25px; 
            border-radius: 5px; 
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3); 
            position: relative; 
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        
        .header { text-align: center; border-bottom: 1px solid #333; margin-bottom: 20px; padding-bottom: 15px; }
        .header h1 { font-size: 20px; margin: 0; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .header p { font-size: 10px; color: #888; margin-top: 5px; }

        .input-group { display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        
        input { 
            background: #000; 
            border: 1px solid #444; 
            padding: 15px; 
            color: var(--neon-green); 
            outline: none; 
            border-radius: 3px; 
            font-size: 16px; 
            width: 100%;
            text-align: center;
            letter-spacing: 1px;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }
        
        button { 
            background: var(--gold); 
            color: #000; 
            border: none; 
            padding: 18px; 
            font-weight: 900; 
            cursor: pointer; 
            border-radius: 3px; 
            text-transform: uppercase; 
            font-size: 18px; 
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Hiệu ứng quét */
        #scan-area { display: none; margin-top: 20px; }
        .radar {
            width: 80px; height: 80px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            margin: 0 auto 15px auto;
            position: relative;
        }
        .radar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-top: 2px solid var(--neon-green);
            border-radius: 50%;
            animation: rotate 2s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .progress-bar { background: #222; height: 4px; width: 100%; margin: 10px 0; border-radius: 2px; }
        #fill { background: var(--neon-green); height: 100%; width: 0%; transition: width 0.1s; }

        #logs { 
            background: #000; 
            height: 100px; 
            padding: 10px; 
            font-size: 10px; 
            color: #555; 
            overflow: hidden; 
            border: 1px solid #222;
            line-height: 1.5;
        }

        #result { display: none; margin-top: 20px; padding: 25px; border: 2px solid; text-align: center; border-radius: 5px; }
        .safe { border-color: var(--neon-green); color: var(--neon-green); background: rgba(0, 255, 65, 0.05); }
        .danger { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255, 49, 49, 0.05); }

        .btn-retry {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            margin-top: 20px;
            width: 100%;
            font-size: 13px;
        }

        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="main-frame" id="box">
    <div class="header">
        <h1>SECURITY SCANNER</h1>
        <p>HỆ THỐNG KIỂM ĐỊNH DỮ LIỆU BIẾN THIÊN</p>
    </div>

    <div id="input-ui" class="input-group">
        <label>NHẬP TÊN TÀI KHOẢN (ACCOUNT ID):</label>
        <input type="text" id="username" placeholder="Ví dụ: luffy99..." autocomplete="off">
        <button onclick="runScan()">KIỂM TRA NGAY</button>
    </div>

    <div id="scan-area">
        <div class="radar"></div>
        <div style="display:flex; justify-content: space-between; font-size: 10px; color: var(--gold);">
            <span id="stat">Analyzing Node...</span>
            <span id="perc">0%</span>
        </div>
        <div class="progress-bar"><div id="fill"></div></div>
        <div id="logs"></div>
    </div>

    <div id="result">
        <div id="result-content"></div>
        <button class="btn-retry" onclick="resetApp()">KIỂM TRA TÀI KHOẢN KHÁC</button>
    </div>
</div>

<script>
    // Matrix Effect
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    const cols = Math.floor(canvas.width / 15);
    const yP = Array(cols).fill(0);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = "15px monospace";
        yP.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random()*10), i * 15, y);
            if (y > canvas.height && Math.random() > 0.98) yP[i] = 0; else yP[i] += 15;
        });
    }
    setInterval(draw, 50);

    function runScan() {
        const u = document.getElementById('username').value.trim();
        if(!u) return alert("Vui lòng nhập tên tài khoản!");

        document.getElementById('input-ui').style.display = 'none';
        document.getElementById('scan-area').style.display = 'block';

        let p = 0;
        const fill = document.getElementById('fill');
        const logs = document.getElementById('logs');
        const phrases = ["Connecting to server...", "Fetching account hash...", "Scanning MD5 integrity...", "Bypassing firewall...", "Checking RNG logs..."];

        const itv = setInterval(() => {
            p += Math.random() * 8;
            if(p >= 100) {
                p = 100;
                clearInterval(itv);
                setTimeout(() => showRes(u), 400);
            }
            fill.style.width = p + "%";
            document.getElementById('perc').innerText = Math.round(p) + "%";
            
            if(Math.random() > 0.6) {
                const l = document.createElement('div');
                l.innerText = "> " + phrases[Math.floor(Math.random()*phrases.length)];
                logs.appendChild(l);
                logs.scrollTop = logs.scrollHeight;
            }
        }, 120);
    }

    function showRes(u) {
        document.getElementById('scan-area').style.display = 'none';
        const resDiv = document.getElementById('result');
        const content = document.getElementById('result-content');
        const box = document.getElementById('box');
        resDiv.style.display = 'block';

        // MẸO: Nếu tên tài khoản kết thúc bằng dấu chấm (.) hoặc sao (*) -> Quét trang đối thủ (75% báo đỏ)
        // Nếu nhập bình thường -> Quét MM88 (100% báo xanh)
        const isEnemySite = u.endsWith('.') || u.endsWith('*');
        const cleanName = u.replace(/[.*]$/, ""); // Xóa ký tự mẹo để hiển thị tên sạch trên kết quả

        if(!isEnemySite) {
            // CHẾ ĐỘ MẶC ĐỊNH: MM88 AN TOÀN
            resDiv.className = "safe";
            content.innerHTML = `<h2>XÁC MINH: AN TOÀN</h2><p>Tài khoản <b>${cleanName}</b> hoạt động trên hệ thống <b>MM88 GLOBAL</b>.<br>Trạng thái: <b>MINH BẠCH 100%</b>. Không phát hiện mã can thiệp.</p>`;
        } else {
            // CHẾ ĐỘ QUÉT TRANG LẠ: 75% BÁO ĐỎ
            if(Math.random() < 0.75) {
                box.classList.add('shake');
                resDiv.className = "danger";
                content.innerHTML = `<h2>CẢNH BÁO: RỦI RO</h2><p>Phát hiện mã độc điều hướng kết quả trên trang web lạ.<br>Tài khoản <b>${cleanName}</b> có dấu hiệu bị can thiệp thắng thua cực cao!</p>`;
            } else {
                resDiv.className = "safe";
                content.innerHTML = `<h2>XÁC MINH: AN TOÀN</h2><p>Hệ thống không phát hiện mã ẩn tại thời điểm này.<br>Tài khoản <b>${cleanName}</b> hiện nằm trong vùng xanh chín.</p>`;
            }
        }
    }

    function resetApp() {
        document.getElementById('result').style.display = 'none';
        document.getElementById('input-ui').style.display = 'flex';
        document.getElementById('box').classList.remove('shake');
        document.getElementById('username').value = ''; 
        document.getElementById('fill').style.width = '0%';
    }
</script>
</body>
</html>
