<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG KIỂM ĐỊNH BẢO MẬT TOÀN CẦU | MM88 GLOBAL</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-green: #003300;
            --neon-red: #ff3131;
            --dark-red: #330000;
            --gold: #ffcc00;
            --dark-bg: #000000;
            --panel-bg: rgba(10, 10, 10, 0.9);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--dark-bg); 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            position: relative;
        }

        /* Hiệu ứng nền Matrix */
        #matrix-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.1;
            z-index: 1;
        }

        .main-frame { 
            width: 95%; 
            max-width: 500px; 
            background: var(--panel-bg); 
            border: 2px solid var(--neon-green); 
            padding: 30px; 
            border-radius: 5px; 
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.4); 
            position: relative; 
            z-index: 10;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        /* Tiêu đề góc màn hình dạng Military */
        .corner-tag {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--dark-bg);
            padding: 0 10px;
            color: var(--neon-green);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--neon-green);
        }

        .header { text-align: center; border-bottom: 1px solid #333; margin-bottom: 25px; padding-bottom: 15px; position: relative; }
        .header h1 { font-size: 22px; margin: 0; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); }
        .header p { font-size: 11px; color: #888; margin: 8px 0 0 0; letter-spacing: 1px; }
        
        /* Hiệu ứng đèn LED trạng thái */
        .led-status {
            width: 10px; height: 10px;
            background-color: var(--neon-green);
            border-radius: 50%;
            position: absolute;
            top: 5px; right: 5px;
            box-shadow: 0 0 10px var(--neon-green);
            animation: blink 1s infinite;
        }
